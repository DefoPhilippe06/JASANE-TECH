<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}JASANE-TECH{% endblock %}</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50">
    <!-- Navbar globale -->
    <nav class="bg-white bg-opacity-60 shadow-lg fixed w-full z-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-2">
                    <img src="/static/images/logo-jasane.png" alt="JASANE Technology" class="h-10 w-10 object-contain" />
                    <span class="text-xl font-bold text-black">JASANE-TECH</span>
                </div>
                <div class="hidden md:flex space-x-1">
                    <a href="{% url 'home' %}" class="px-4 py-2 rounded-lg text-black hover:bg-blue-50 hover:text-blue-600 font-medium">Accueil</a>
                    <a href="{% url 'about' %}" class="px-4 py-2 rounded-lg text-black hover:bg-blue-50 hover:text-blue-600 font-medium">À propos</a>
                    <a href="{% url 'products:product_list' %}" class="px-4 py-2 rounded-lg text-black hover:bg-blue-50 hover:text-blue-600 font-medium">Produits</a>
                    <a href="{% url 'products:cart' %}" class="px-4 py-2 rounded-lg text-black hover:bg-blue-50 hover:text-blue-600 font-medium">Panier</a>
                    <a href="{% url 'products:category_list' %}" class="px-4 py-2 rounded-lg text-black hover:bg-blue-50 hover:text-blue-600 font-medium">Catégories</a>
                    <a href="{% url 'settings' %}" class="px-4 py-2 rounded-lg text-black hover:bg-blue-50 hover:text-blue-600 font-medium">Paramètres</a>
                    <a href="{% url 'contact' %}" class="px-4 py-2 rounded-lg text-black hover:bg-blue-50 hover:text-blue-600 font-medium">Contact</a>
                </div>
                <div class="md:hidden">
                    <button id="mobile-menu-button" class="text-black hover:text-gray-700">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                </div>
            </div>
        </div>
        <!-- Mobile menu -->
        <div id="mobile-menu" class="hidden md:hidden bg-white bg-opacity-60 border-t">
            <div class="px-2 pt-2 pb-3 space-y-1">
                <a href="{% url 'home' %}" class="block px-3 py-2 rounded-md text-black font-medium hover:bg-blue-50 hover:text-blue-600">Accueil</a>
                <a href="#about" class="block px-3 py-2 rounded-md text-black font-medium hover:bg-blue-50 hover:text-blue-600">À propos</a>
                <a href="{% url 'products:product_list' %}" class="block px-3 py-2 rounded-md text-black font-medium hover:bg-blue-50 hover:text-blue-600">Produits</a>
                <a href="{% url 'products:cart' %}" class="block px-3 py-2 rounded-md text-black font-medium hover:bg-blue-50 hover:text-blue-600">Panier</a>
                <a href="{% url 'products:category_list' %}" class="block px-3 py-2 rounded-md text-black font-medium hover:bg-blue-50 hover:text-blue-600">Catégories</a>
                <a href="{% url 'settings' %}" class="block px-3 py-2 rounded-md text-black font-medium hover:bg-blue-50 hover:text-blue-600">Paramètres</a>
                <a href="#contact" class="block px-3 py-2 rounded-md text-black font-medium hover:bg-blue-50 hover:text-blue-600">Contact</a>
            </div>
        </div>
    </nav>
    <div class="pt-20">
        {% block content %}{% endblock %}
    </div>
    {% block extra_body %}{% endblock %}
</body>
</html>
